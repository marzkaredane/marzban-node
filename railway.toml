# Railway configuration for Marzban-node (Optimized for gRPC & Auto-Healthcheck)
# https://docs.railway.app/deploy/config-as-code

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Path changed to / because gRPC healthcheck handles the root route perfectly
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[env]
# Switched to gRPC protocol for seamless mTLS and seamless Railway private networking
SERVICE_PROTOCOL = "grpc"
SERVICE_TLS = "true"
SERVICE_HOST = "0.0.0.0"

XRAY_EXECUTABLE_PATH = "/usr/local/bin/xray"
XRAY_ASSETS_PATH = "/usr/local/share/xray"
SSL_DIR = "/var/lib/marzban-node"

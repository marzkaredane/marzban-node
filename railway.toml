# Railway configuration for Marzban-node (Optimized for gRPC)
# https://docs.railway.app/deploy/config-as-code

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Switched to root '/' because gRPC health check responds perfectly here
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[env]
# Protocol and TLS setup for secure private networking
SERVICE_PROTOCOL = "grpc"
SERVICE_TLS = "true"
SERVICE_HOST = "0.0.0.0"

XRAY_EXECUTABLE_PATH = "/usr/local/bin/xray"
XRAY_ASSETS_PATH = "/usr/local/share/xray"
SSL_DIR = "/var/lib/marzban-node"
